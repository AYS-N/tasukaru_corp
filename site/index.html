<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>株式会社タスカル | 整理・買取・再販のリユース事業</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

:root {
  --tascal-cyan:        #8FB73E;
  --tascal-cyan-deep:   #5E8526;
  --tascal-cyan-soft:   #DCE8BC;
  --tascal-cyan-tint:   #F1F6E3;

  --leaf:               #8FB73E;
  --leaf-bright:        #A8CC4A;
  --leaf-deep:          #5E8526;
  --leaf-soft:          #DCE8BC;
  --leaf-tint:          #F1F6E3;

  --cream:              #FAF6EE;
  --cream-deep:         #F2EADC;
  --sand:               #E8DCC4;
  --taupe:              #B8A691;
  --bark:               #6B5D4A;

  --surface:            #FFFFFF;

  --ink-1:              #1E2A2F;
  --ink-2:              #4A5862;
  --ink-3:              #8A95A0;
  --ink-4:              #B8C2CB;

  --border-hair:        #E2D9C7;
  --border-input:       #B8A691;

  --success:            #5B9E6F;
  --success-bg:         #E9F2EC;
  --warning:            #C99A38;
  --warning-bg:         #FBF1D6;
  --error:              #B85049;
  --error-bg:           #F7E5E3;

  --shadow-1: 0 1px 3px rgba(107,93,74,.06), 0 1px 2px rgba(107,93,74,.04);
  --shadow-2: 0 8px 24px rgba(107,93,74,.08), 0 2px 6px rgba(107,93,74,.05);
  --shadow-3: 0 20px 48px rgba(107,93,74,.12), 0 6px 14px rgba(107,93,74,.06);

  --radius-sm:   4px;
  --radius-md:   8px;
  --radius-lg:   12px;
  --radius-xl:   20px;
  --radius-pill: 999px;

  --space-1:   4px;
  --space-2:   8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  24px;
  --space-6:  32px;
  --space-7:  48px;
  --space-8:  64px;
  --space-9:  96px;
  --space-10:128px;
  --space-11:160px;

  --font-jp:        'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic UI', 'Meiryo', system-ui, sans-serif;
  --font-jp-serif:  'Noto Serif JP', 'Hiragino Mincho Pro', 'Yu Mincho', 'MS Mincho', serif;
  --font-latin:     'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-mono:      ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  --font-base:      var(--font-jp);

  --t-display:    clamp(40px, 5.4vw, 72px);
  --t-h1:         clamp(32px, 3.6vw, 44px);
  --t-h2:         32px;
  --t-h3:         22px;
  --t-h4:         18px;
  --t-h5:         16px;
  --t-eyebrow:    12px;
  --t-body-lg:    17px;
  --t-body:       15px;
  --t-body-sm:    14px;
  --t-caption:    12px;

  --lh-tight:   1.25;
  --lh-snug:    1.5;
  --lh-body:    1.95;
}

html, body {
  background: var(--cream);
  color: var(--ink-1);
  font-family: var(--font-base);
  font-size: var(--t-body);
  line-height: var(--lh-body);
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body { margin: 0; }
html { scroll-behavior: smooth; }
::selection { background: var(--leaf-tint); color: var(--ink-1); }

h1, .h1 {
  font-family: var(--font-jp-serif);
  font-size: var(--t-h1);
  line-height: var(--lh-tight);
  font-weight: 600;
  color: var(--ink-1);
  margin: 0 0 var(--space-5);
  letter-spacing: 0.02em;
}
h2, .h2 {
  font-family: var(--font-jp-serif);
  font-size: var(--t-h2);
  line-height: var(--lh-snug);
  font-weight: 500;
  color: var(--ink-1);
  margin: 0 0 var(--space-5);
  letter-spacing: 0.04em;
}
h3, .h3 {
  font-family: var(--font-jp);
  font-size: var(--t-h3);
  line-height: var(--lh-snug);
  font-weight: 700;
  color: var(--ink-1);
  margin: 0 0 var(--space-3);
}
h4, .h4 {
  font-size: var(--t-h4);
  font-weight: 700;
  color: var(--ink-1);
  margin: 0 0 var(--space-3);
}
p {
  margin: 0 0 var(--space-4);
  color: var(--ink-2);
  line-height: var(--lh-body);
}
.display {
  font-family: var(--font-jp-serif);
  font-size: var(--t-display);
  line-height: 1.3;
  font-weight: 500;
  color: var(--ink-1);
  letter-spacing: 0.04em;
}
.eyebrow {
  font-family: var(--font-latin);
  font-size: var(--t-eyebrow);
  font-weight: 600;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--leaf-deep);
}
.eyebrow-jp {
  font-family: var(--font-jp);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.24em;
  color: var(--leaf-deep);
  display: inline-flex;
  align-items: center;
  gap: 12px;
}
.eyebrow-jp::before {
  content: '';
  width: 32px;
  height: 1px;
  background: var(--leaf);
}
.caption {
  font-size: var(--t-caption);
  color: var(--ink-3);
}
a {
  color: var(--ink-1);
  text-decoration: underline;
  text-decoration-color: var(--leaf);
  text-decoration-thickness: 1.5px;
  text-underline-offset: 4px;
  transition: color 200ms ease, text-decoration-color 200ms ease;
}
a:hover { color: var(--leaf-deep); }
a:focus-visible {
  outline: 2px solid rgba(143,183,62,.55);
  outline-offset: 3px;
  border-radius: 2px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  padding: 14px 28px;
  border-radius: var(--radius-pill);
  border: 1.5px solid transparent;
  font-family: var(--font-base);
  font-size: var(--t-body);
  font-weight: 600;
  line-height: 1;
  cursor: pointer;
  text-decoration: none;
  transition: background 200ms ease, color 200ms ease, border-color 200ms ease, box-shadow 200ms ease;
  white-space: nowrap;
}
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--ink-1); color: #fff; }
.btn-primary:hover { background: var(--leaf-deep); color: #fff; }
.btn-cyan { background: var(--tascal-cyan); color: #fff; }
.btn-cyan:hover { background: var(--tascal-cyan-deep); color: #fff; }
.btn-leaf { background: var(--leaf); color: #fff; }
.btn-leaf:hover { background: var(--leaf-deep); color: #fff; }
.btn-ghost {
  background: transparent;
  color: var(--ink-1);
  border-color: var(--ink-1);
}
.btn-ghost:hover { background: var(--ink-1); color: #fff; }
.btn-arrow {
  background: transparent;
  border: none;
  color: var(--ink-1);
  font-weight: 600;
  padding: 0;
  display: inline-flex;
  align-items: center;
  gap: 12px;
  border-radius: 0;
  border-bottom: 1.5px solid var(--ink-1);
  padding-bottom: 6px;
  text-decoration: none;
  cursor: pointer;
  font-family: var(--font-base);
  font-size: var(--t-body);
}
.btn-arrow:hover { color: var(--leaf-deep); border-bottom-color: var(--leaf); }

.card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: var(--space-6);
  box-shadow: var(--shadow-1);
  transition: box-shadow 280ms ease, transform 280ms ease;
}
.card:hover { box-shadow: var(--shadow-2); transform: translateY(-3px); }

.input {
  display: block;
  width: 100%;
  padding: 14px 16px;
  background: var(--surface);
  border: none;
  border-bottom: 1.5px solid var(--border-input);
  border-radius: 0;
  font-family: var(--font-base);
  font-size: var(--t-body);
  color: var(--ink-1);
  transition: border-color 200ms ease;
  box-sizing: border-box;
}
.input:focus { outline: none; border-bottom-color: var(--leaf); }
.input::placeholder { color: var(--ink-4); }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: var(--radius-pill);
  font-size: var(--t-caption);
  font-weight: 600;
  letter-spacing: 0.08em;
  line-height: 1.4;
}
.badge-info    { background: var(--leaf-tint);    color: var(--leaf-deep); }
.badge-outline { background: transparent; color: var(--ink-1); border: 1px solid var(--ink-1); }
.badge-warm    { background: var(--sand); color: var(--bark); }

.rule-diagonal {
  width: 80px;
  height: 1px;
  background: var(--leaf);
  transform: rotate(-12deg);
  transform-origin: left center;
  margin: 24px 0;
}

.concept-ticks {
  display: inline-flex;
  gap: 5px;
}
.concept-ticks span {
  display: block;
  width: 2px;
  height: 26px;
  background: var(--leaf);
  transform: skewX(-22deg);
}
.concept-ticks span:nth-child(2) { background: var(--leaf-bright); height: 20px; align-self: flex-end; }
.concept-ticks span:nth-child(3) { background: var(--leaf-soft);   height: 14px; align-self: flex-end; }

.jp-spaced { letter-spacing: 0.28em; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ── Services Data ─────────────────────────────────────────── */
const SERVICES_DATA = {
  'ihin-seiri': {
    num: '01', en: 'ESTATE CLEANUP', title: '遺品整理',
    short: 'ご遺族に代わり、故人の遺品を丁寧に仕分け・整理いたします。',

/* ── Header ────────────────────────────────────────────────── */
const Header = ({ current = 'home' }) => {
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 24);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const NAV = [
    { id: 'about',    en: 'ABOUT',    jp: '会社概要',       href: 'about.html' },
    { id: 'services', en: 'SERVICES', jp: '事業内容',       href: 'services.html' },
    { id: 'business', en: 'BUSINESS', jp: '法人のお客様へ', href: 'business.html' },
    { id: 'recruit',  en: 'RECRUIT',  jp: '採用情報',       href: 'recruit.html' },
  ];

  return (
    <header style={{
      position: 'sticky', top: 0, zIndex: 50,
      background: scrolled ? 'rgba(250,246,238,0.94)' : 'var(--cream)',
      backdropFilter: scrolled ? 'blur(18px) saturate(140%)' : 'none',
      borderBottom: scrolled ? '1px solid var(--border-hair)' : '1px solid transparent',
      transition: 'all 280ms ease',

      <div style={{

        <nav style={{ display: 'flex', alignItems: 'center', gap: 32 }}>
          {NAV.map(p => (
            <a key={p.id} href={p.href} style={{
              textDecoration: 'none',
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2,
              position: 'relative', paddingBottom: 6,

              <span style={{
                fontFamily: 'var(--font-latin)',
                fontSize: 10, fontWeight: 600,
                letterSpacing: '0.28em',
                color: 'var(--tascal-cyan-deep)',
                opacity: current === p.id ? 1 : 0.65,
              }}>{p.en}</span>
              <span style={{
                fontSize: 13, fontWeight: 700,
                color: 'var(--ink-1)',
              }}>{p.jp}</span>
              {current === p.id && (
                <span style={{
                  position: 'absolute', bottom: -2, left: '50%',
                  transform: 'translateX(-50%)',
                  width: 24, height: 1.5,
                  background: 'var(--tascal-cyan)',
                }}/>
              )}
            </a>
          ))}
        </nav>

        <div style={{ display: 'flex', alignItems: 'center', gap: 16, flexShrink: 0 }}>
          <a href="tel:0120433233" style={{
            textDecoration: 'none',
            display: 'flex', flexDirection: 'column', alignItems: 'flex-end',
            lineHeight: 1.2,
          }}>
            <span style={{
              fontFamily: 'var(--font-latin)',
              fontSize: 9, fontWeight: 600,
              letterSpacing: '0.24em',
              color: 'var(--ink-3)',
            }}>TEL · 受付 9:00-18:00</span>
            <span style={{
              fontFamily: 'var(--font-latin)',
              fontSize: 22, fontWeight: 600,
              letterSpacing: '0.02em',
              color: 'var(--ink-1)',
            }}>0120-433-233</span>
          </a>
          <a href="contact.html" style={{
            textDecoration: 'none',
            fontSize: 13, fontWeight: 600,
            color: '#fff',
            background: current === 'contact' ? 'var(--tascal-cyan-deep)' : 'var(--ink-1)',
            padding: '12px 22px', borderRadius: 999,
            transition: 'background 200ms ease',
          }}>お問い合わせ</a>
        </div>
      </div>
    </header>
  );
};

/* ── Footer ────────────────────────────────────────────────── */
const SITEMAP = [
  {
    head: '会社情報', en: 'ABOUT',
    items: [

            <div style={{ fontSize: 11, color: '#7B8D98' }}>受付 10:00 - 19:00 / 年中無休</div>

        {SITEMAP.map(col => (
          <div key={col.head}>

              fontFamily: 'var(--font-latin)',

            <ul style={{ margin: 0, padding: 0, listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 10 }}>
              {col.items.map(it => (
                <li key={it.t}>
                  <a href={it.h} style={{ fontSize: 13.5, color: '#fff', textDecoration: 'none' }}>— {it.t}</a>
                </li>
              ))}
            </ul>
          </div>
        ))}
      </div>

      <div style={{
        borderTop: '1px solid rgba(255,255,255,0.1)',
        paddingTop: 24,
        display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: 16,
        fontSize: 12, color: '#7B8D98',
      }}>
        <div>© 株式会社タスカル All Rights Reserved.</div>
        <div style={{ display: 'flex', gap: 24 }}>
          <a href="privacy.html" style={{ color: '#7B8D98', textDecoration: 'none' }}>プライバシーポリシー</a>

      </div>

);

/* ── Hero ──────────────────────────────────────────────────── */

  <section id="top" style={{
    position: 'relative',
    padding: '80px 40px 140px',
    overflow: 'hidden',
  }}>
    <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 0 }}>

      <div style={{
