<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --leaf: #8FB73E; --leaf-bright: #A8CC4A; --leaf-deep: #5E8526;
    --leaf-soft: #DCE8BC; --leaf-tint: #F1F6E3;
    --cream: #FAF6EE; --cream-deep: #F2EADC; --ink-1: #1E2A2F; --ink-2: #4A5862; --ink-3: #8A95A0;
  }
  html, body { width: 1200px; height: 630px; }
  body {
    background: var(--cream);
    position: relative;
    overflow: hidden;
    font-family: 'Noto Sans JP', sans-serif;
  }
  /* decorative blobs (hero motif) */
  .blob1 {
    position: absolute; top: -120px; right: -140px; width: 720px; height: 720px;
    background: var(--leaf-tint); transform: rotate(-7deg);
    border-radius: 42% 32% 36% 40%;
  }
  .blob2 {
    position: absolute; top: 60px; right: -40px; width: 460px; height: 520px;
    background: var(--leaf-soft); transform: rotate(-13deg);
    border-radius: 46% 34% 40% 30%; opacity: 0.7;
  }
  .content {
    position: relative; z-index: 2;
    height: 100%;
    padding: 72px 80px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .top { display: flex; align-items: center; gap: 20px; }
  .logo { height: 64px; }
  .ticks { display: inline-flex; align-items: flex-end; gap: 6px; margin-bottom: 28px; }
  .ticks span { display: block; width: 3px; transform: skewX(-22deg); }
  .ticks span:nth-child(1) { height: 34px; background: var(--leaf); }
  .ticks span:nth-child(2) { height: 26px; background: var(--leaf-bright); }
  .ticks span:nth-child(3) { height: 18px; background: var(--leaf-soft); }
  .eyebrow {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 20px; font-weight: 700; letter-spacing: 0.22em;
    color: var(--leaf-deep); margin-bottom: 26px;
    display: flex; align-items: center; gap: 16px;
  }
  .eyebrow::before { content: ''; width: 44px; height: 2px; background: var(--leaf); }
  h1 {
    font-family: 'Noto Serif JP', serif;
    font-weight: 600;
    font-size: 68px; line-height: 1.4; letter-spacing: 0.04em;
    color: var(--ink-1);
  }
  h1 .accent {
    color: var(--leaf-deep);
    position: relative;
  }
  .sub {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 24px; font-weight: 400; line-height: 1.7;
    color: var(--ink-2); letter-spacing: 0.04em;
    margin-top: 4px;
  }
  .bottom { display: flex; align-items: center; justify-content: space-between; }
  .services {
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .chip {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 18px; font-weight: 500; color: var(--leaf-deep);
    background: #fff; border: 1px solid var(--leaf-soft);
    padding: 8px 18px; border-radius: 999px;
  }
  .place {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 19px; font-weight: 700; color: var(--ink-1);
    letter-spacing: 0.06em; white-space: nowrap;
    display: flex; align-items: center; gap: 10px;
  }
  .place .tel { font-size: 26px; letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="blob1"></div>
  <div class="blob2"></div>
  <div class="content">
    <div class="top">
      <img class="logo" src="../assets/logo-tasukaru-green.png" alt="">
    </div>

    <div>
      <div class="eyebrow">REUSE × ORGANIZE × CARE</div>
      <h1>かたづかない<span class="accent">モノ</span>と思い出を、<br>丁寧に。</h1>
      <div class="sub">埼玉・上尾の整理・買取・再販のリユース事業</div>
    </div>

    <div class="bottom">
      <div class="services">
        <span class="chip">遺品整理</span>
        <span class="chip">生前整理</span>
        <span class="chip">福祉整理</span>
        <span class="chip">お片付け</span>
        <span class="chip">買取</span>
        <span class="chip">ネット販売</span>
      </div>
      <div class="place"><span class="tel">048-782-6606</span></div>
    </div>
  </div>
</body>
</html>
